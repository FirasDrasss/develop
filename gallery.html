<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Cooldata v2 — Sample Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 24px 20px; }
    h1 { text-align: center; font-size: 20px; font-weight: 500; color: #333; margin-bottom: 4px; }
    .subtitle { text-align: center; font-size: 13px; color: #888; margin-bottom: 20px; }
    .controls {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .controls button {
      padding: 6px 16px; border: 1px solid #ccc; border-radius: 6px;
      background: white; cursor: pointer; font-size: 14px;
    }
    .controls button:hover { background: #f0f0f0; }
    .controls button:disabled { opacity: 0.4; cursor: default; }
    .page-info { font-size: 14px; color: #555; min-width: 180px; text-align: center; }
    .jump { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #555; }
    .jump input {
      width: 70px; padding: 5px 8px; border: 1px solid #ccc;
      border-radius: 6px; font-size: 13px; text-align: center;
    }
    .jump button {
      padding: 5px 12px; border: 1px solid #ccc; border-radius: 6px;
      background: white; cursor: pointer; font-size: 13px;
    }
    .gallery {
      display: flex; flex-wrap: wrap; gap: 14px;
      justify-content: center; min-height: 200px;
    }
    .gallery > div {
      background: white; border-radius: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.10);
    }
  </style>
</head>
<body>
  <h1>Cooldata v2 — Sample Gallery</h1>
  <p class="subtitle">100 of ~270,876 samples &nbsp;·&nbsp; 5 pages &nbsp;·&nbsp; 20 per page</p>

  <div class="controls">
    <button id="t-first" onclick="goTo(0)">« First</button>
    <button id="t-prev"  onclick="goTo(page-1)">‹ Prev</button>
    <span class="page-info" id="t-info"></span>
    <button id="t-next"  onclick="goTo(page+1)">Next ›</button>
    <button id="t-last"  onclick="goTo(nPages-1)">Last »</button>
    <span class="jump">
      Go to page
      <input type="number" id="jump-input" min="1" max="5" value="1"/>
      <button onclick="jumpTo()">Go</button>
    </span>
  </div>

  <div class="gallery" id="gallery"></div>

  <div class="controls" style="margin-top:20px;">
    <button id="b-first" onclick="goTo(0)">« First</button>

    <button id="b-next"  onclick="goTo(page+1)">Next ›</button>

    const nPages = 5;
    const pgSize = 20;
    let page = 0;

    function goTo(p) {
      page = Math.max(0, Math.min(nPages - 1, p));
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function jumpTo() {
      const v = parseInt(document.getElementById('jump-input').value, 10);
      if (!isNaN(v)) goTo(v - 1);
    }

    function render() {
      const start = page * pgSize;
      const end   = Math.min(start + pgSize, cards.length);
      document.getElementById('gallery').innerHTML = cards.slice(start, end).join('\n');

      const label = `Page ${page+1} of ${nPages} &nbsp;·&nbsp; samples ${start+1}–${end}`;
      document.getElementById('t-info').innerHTML = label;
      document.getElementById('b-info').innerHTML = label;
      document.getElementById('jump-input').value = page + 1;

      const atFirst = page === 0, atLast = page === nPages - 1;
      ['t-first','t-prev','b-first','b-prev'].forEach(id =>
        document.getElementById(id).disabled = atFirst);
      ['t-last','t-next','b-last','b-next'].forEach(id =>
        document.getElementById(id).disabled = atLast);
    }

    document.getElementById('jump-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') jumpTo();
    });

    render();
  </script>
